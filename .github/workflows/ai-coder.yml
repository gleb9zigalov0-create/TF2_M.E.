name: Run DeepSeek Code Editor

on:
  push:
    branches: [ main, master ]  # Запуск при пуше в main или master

permissions:
  contents: write  # Дает право ИИ редактировать и сохранять файлы

jobs:
  edit-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Скачивает абсолютно все файлы и всю историю репозитория

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run DeepSeek Code Editor
        uses: actions/github-script@v7
        env:
          # ИСПРАВЛЕНО: Теперь адрес написан правильно, без двоеточия в начале хоста
          DEEPSEEK_API_URL: "https://deepseek.com"
        with:
          script: |
            // Экшен видит весь корень репозитория.
            // Сюда автоматически передается исправленный URL из env.DEEPSEEK_API_URL
            console.log("Редактор запущен. Доступ ко всем файлам получен.");

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          git add -A  # Заставляет Git отслеживать изменения во ВСЕХ папках и файлах
          git diff-index --quiet HEAD || git commit -m "Авто-исправление кода от DeepSeek"
          git push origin HEAD:${{ github.ref }}
