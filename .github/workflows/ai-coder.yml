name: AI Coder Assistant

# Бот будет "слушать" создание и редактирование задач (Issues)
on:
  issues:
    types: [opened, edited]

# Даем боту полные права на чтение/запись файлов и работу с задачами
permissions:
  contents: write
  issues: write

jobs:
  ai_job:
    # Запускается, только если в задаче (Issue) есть метка 'ai-code'
    if: contains(github.event.issue.labels.*.name, 'ai-code')
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем абсолютно все файлы и всю историю репозитория
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3. Запуск самого ИИ-инструмента
      - name: Run DeepSeek Code Editor
        uses: actions/github-script@v7
        env:
          # Передаем ваш секретный ключ, который вы сохранили в репозитории
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Исправляем прошлую ошибку: пишем чистый, правильный URL API
          DEEPSEEK_API_URL: "https://deepseek.com"
        with:
          script: |
            const issueBody = context.payload.issue.body;
            console.log("Робот успешно запустился!");
            console.log("Текст вашей задачи: " + issueBody);
            // Здесь ваш ИИ-инструмент начнет читать промт и править main_menu.html

      # 4. Сохраняем изменения (Push) обратно в ваш репозиторий
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          git add -A  # Заставляем Git видеть изменения абсолютно во всех файлах
          git diff-index --quiet HEAD || git commit -m "Авто-фикс от ИИ-агента (Task #${{ github.event.issue.number }})"
          git push origin HEAD:${{ github.ref }}
