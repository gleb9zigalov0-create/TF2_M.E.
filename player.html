<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <audio id="bgMusic" loop></audio>
    <script>
    const tracks = [
        "sounds/main_menu/1.mp3",
        "sounds/main_menu/2.mp3",
        "sounds/main_menu/3.mp3"
    ];

    const audio = document.getElementById('bgMusic');

    // Восстанавливаем трек
    const savedTrack = localStorage.getItem('tf2_current_track');
    let currentTrackIndex = savedTrack !== null ? parseInt(savedTrack, 10) : Math.floor(Math.random() * tracks.length);

    // Восстанавливаем время (позицию) трека
    const savedTime = localStorage.getItem('tf2_current_time');
    
    function startMusic() {
        audio.src = tracks[currentTrackIndex];
        audio.load();
        
        // Если есть сохранённое время, ставим плеер на это место
        if (savedTime !== null) {
            audio.currentTime = parseFloat(savedTime);
        }

        audio.play().catch(() => {
            setTimeout(() => {
                audio.play().catch(() => {});
            }, 500);
        });
    }

    startMusic();

    // Каждую секунду сохраняем текущую позицию трека в localStorage
    setInterval(() => {
        if (!audio.paused) {
            localStorage.setItem('tf2_current_time', audio.currentTime);
        }
    }, 1000);

    // Слушаем команды от главной страницы (переключение трека)
    window.addEventListener('message', function(event) {
        if (event.data === 'next_track') {
            currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            localStorage.setItem('tf2_current_track', currentTrackIndex);
            localStorage.setItem('tf2_current_time', 0); // Сбрасываем время для нового трека
            startMusic();
        } else if (event.data === 'start_music') {
            startMusic();
        }
    });
</script>
</body>
</html>
